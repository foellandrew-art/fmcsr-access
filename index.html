    <script>
        function generateReceipt() {
            const name = document.getElementById('driverNameInput').value.trim();
            if (!name) {
                alert("Please enter your name to sign the document.");
                return;
            }

            // 1. Populate the data
            document.getElementById('displayDriverName').innerText = name.toUpperCase();
            document.getElementById('displaySignature').innerText = name;
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString();

            // 2. Hide the website UI and show ONLY the receipt
            document.querySelectorAll('.no-print').forEach(el => el.classList.add('hidden'));
            const receipt = document.getElementById('printableReceipt');
            receipt.classList.remove('print-only');
            receipt.classList.add('block');
            
            // 3. Auto-scroll to top so the print preview starts at the beginning
            window.scrollTo(0,0);

            // 4. Trigger the Print Logic
            // We use a tiny delay (100ms) to ensure the UI has finished hiding 
            // the form before the print dialog captures the screen.
            setTimeout(() => {
                window.print();
            }, 100);
        }

        function resetForm() {
            // This allows the driver to go back and fix a typo if needed
            document.querySelectorAll('.no-print').forEach(el => el.classList.remove('hidden'));
            const receipt = document.getElementById('printableReceipt');
            receipt.classList.add('print-only');
            receipt.classList.remove('block');
        }
    </script>
